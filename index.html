<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI神器库 - 为创业者量身定制的AI工具库</title>
<meta name="description" content="精选200+AI工具，帮助创业者做内容赚钱。">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--cyan:#00f0ff;--green:#00ff88;--dark:#050508;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--dark);color:white;min-height:100vh;}
.wrap{width:100%;max-width:1100px;margin:0 auto;padding:80px 40px 60px;}
.hero{text-align:center;margin-bottom:50px;}
.hero h1{font-size:2.8rem;margin-bottom:15px;background:linear-gradient(135deg,#fff 0%,var(--cyan) 50%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:1.2rem;color:#888;margin-bottom:8px;}
.hero .highlight{color:var(--cyan);font-weight:600;}
.stats{display:flex;justify-content:center;gap:50px;margin-bottom:40px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-size:2.5rem;font-weight:700;color:var(--cyan);}
.stat-label{font-size:0.9rem;color:#888;margin-top:5px;}
.search-wrap{margin-bottom:40px;}
.search-box{display:flex;width:100%;height:56px;border-radius:28px;overflow:hidden;box-shadow:0 4px 20px rgba(0,240,255,0.2);border:2px solid var(--cyan);}
.search-input{flex:1;background:rgba(255,255,255,0.95);border:none;padding:0 24px;font-size:1.1rem;color:#333;line-height:56px;}
.search-input::placeholder{color:#999;}
.search-input:focus{outline:none;}
.search-btn{width:120px;background:linear-gradient(135deg,var(--cyan),var(--green));border:none;font-size:1.1rem;font-weight:600;color:#000;cursor:pointer;}
.search-btn:hover{opacity:0.9;}
.scenes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px;}
.scene-card{background:linear-gradient(135deg,rgba(0,240,255,0.1),rgba(0,255,136,0.05));border:1px solid rgba(0,240,255,0.3);border-radius:16px;padding:24px 20px;text-align:center;cursor:pointer;transition:all 0.3s;}
.scene-card:hover{transform:translateY(-5px);border-color:var(--cyan);box-shadow:0 10px 30px rgba(0,240,255,0.2);}
.scene-icon{font-size:2.5rem;margin-bottom:12px;}
.scene-title{font-size:1.1rem;font-weight:600;color:#fff;margin-bottom:8px;}
.scene-desc{font-size:0.85rem;color:#888;}
.section-title{font-size:1rem;color:#888;margin-bottom:14px;text-align:center;}
.cats-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:30px;}
.cat-btn{display:inline-flex;align-items:center;padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid #2d323d;border-radius:24px;color:#aaa;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
.cat-btn:hover{background:rgba(0,240,255,0.1);border-color:var(--cyan);color:#fff;}
.cat-btn.active{background:linear-gradient(135deg,rgba(0,240,255,0.2),rgba(0,255,136,0.1));border-color:var(--cyan);color:var(--cyan);}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.tool-card{background:rgba(255,255,255,0.03);border:1px solid #2d323d;border-radius:16px;padding:20px;transition:all 0.3s;}
.tool-card:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 25px rgba(0,240,255,0.15);}
.tool-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.tool-name{font-size:1.1rem;font-weight:600;color:var(--cyan);}
.tool-price{font-size:0.8rem;color:var(--green);background:rgba(0,255,136,0.1);padding:3px 10px;border-radius:12px;}
.tool-tag{font-size:0.7rem;color:#fff;background:linear-gradient(135deg,var(--cyan),var(--green));padding:3px 10px;border-radius:12px;font-weight:600;}
.tool-desc{font-size:0.9rem;color:#aaa;line-height:1.5;margin-bottom:15px;}
.tool-link{padding:8px 20px;background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;text-decoration:none;border-radius:8px;font-size:0.85rem;font-weight:600;transition:opacity 0.2s;display:inline-block;}
.tool-link:hover{opacity:0.85;}
.footer{text-align:center;color:#444;font-size:0.85rem;margin-top:60px;padding-top:30px;border-top:1px solid #1a1d24;}
@media(max-width:768px){
.wrap{padding:40px 12px 30px;}
.hero h1{font-size:1.8rem;}
.hero p{font-size:0.95rem;}
.stats{gap:25px;}
.stat-num{font-size:1.8rem;}
.search-box{height:48px;border-radius:24px;}
.search-input{font-size:1rem;padding:0 16px;}
.search-btn{width:80px;font-size:1rem;}
.scenes{grid-template-columns:repeat(2,1fr);gap:10px;}
.scene-card{padding:16px 12px;}
.scene-icon{font-size:1.8rem;}
.scene-title{font-size:0.95rem;}
.scene-desc{font-size:0.75rem;}
.tools-grid{grid-template-columns:1fr;}
}
</style>
