<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI神器库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cyan: #00f0ff; --green: #00ff88; --dark: #050508; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark); color: white; min-height: 100vh; overflow-x: hidden; }
        .bg { position: fixed; inset: 0; z-index: 0; }
        .container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 20px 20px 10px; }
        .main-card { width: 100%; max-width: 700px; }
        .logo-section { text-align: center; margin-bottom: 16px; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 2.4rem; font-weight: 700; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--cyan), var(--green)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 0 0 15px var(--cyan); }
        .logo-text { background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--green) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 0.85rem; color: #00f0ff; font-weight: 600; margin-top: 6px; text-shadow: 0 0 15px rgba(0,240,255,0.5); }
        .search-box { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 14px 18px; font-size: 1rem; color: white; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .search-input:focus { outline: none; border-color: var(--cyan); }
        .search-btn { background: linear-gradient(135deg, var(--cyan), var(--green)); border: none; border-radius: 12px; padding: 14px 24px; font-size: 1rem; font-weight: 600; color: #000; cursor: pointer; }
        
        .quick-title, .cats-title { font-size: 0.8rem; color: #00f0ff; font-weight: 600; margin-bottom: 10px; text-align: left; padding-left: 4px; }
        
        /* 热门工具 - 电脑端5列 */
        .quick-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
        .quick-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; min-height: 56px; }
        .quick-item:hover { background: rgba(0,240,255,0.15); border-color: var(--cyan); }
        .quick-item .name { font-size: 0.8rem; color: white; font-weight: 600; white-space: nowrap; }
        .quick-item .desc { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: 2px; white-space: nowrap; }
        
        /* 选择场景 - 电脑端6列 */
        .cats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 12px; }
        .cat-btn { display: flex; align-items: center; justify-content: center; padding: 10px 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 0.8rem; cursor: pointer; white-space: nowrap; min-height: 40px; }
        .cat-btn:hover { background: rgba(0,240,255,0.12); border-color: rgba(0,240,255,0.4); color: white; }
        .cat-btn.active { background: linear-gradient(135deg, rgba(0,240,255,0.25), rgba(0,255,136,0.15)); border-color: var(--cyan); color: white; }
        
        .results { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
        .results.show { display: block; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .results-title { font-size: 0.95rem; color: var(--cyan); font-weight: 600; }
        .result-list { display: flex; flex-direction: column; gap: 8px; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; }
        .result-info { display: flex; align-items: center; gap: 10px; }
        .result-name { font-size: 0.9rem; font-weight: 600; color: var(--cyan); }
        .result-tag { font-size: 0.55rem; padding: 2px 6px; background: linear-gradient(135deg, var(--cyan), var(--green)); color: #000; border-radius: 8px; font-weight: 600; }
        .result-price { font-size: 0.75rem; color: var(--green); margin-right: 10px; }
        .result-link { padding: 6px 14px; background: linear-gradient(135deg, var(--cyan), var(--green)); color: #000; text-decoration: none; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .footer { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.65rem; margin-top: 12px; }
        
        /* 手机端适配 - 所有内容显示在一个页面 */
        @media (max-width: 768px) { 
            .container { padding: 12px 10px 8px; min-height: auto; } 
            .logo { font-size: 1.6rem; gap: 8px; }
            .logo-icon { width: 32px; height: 32px; font-size: 1rem; }
            .tagline { font-size: 0.7rem; }
            .search-box { margin-bottom: 12px; }
            .search-input { padding: 10px 12px; font-size: 0.9rem; }
            .search-btn { padding: 10px 16px; font-size: 0.9rem; }
            
            /* 手机端热门工具 - 5列2行，缩小对齐 */
            .quick-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
            .quick-item { padding: 8px 4px; min-height: 48px; }
            .quick-item .name { font-size: 0.7rem; }
            .quick-item .desc { font-size: 0.5rem; }
            
            /* 手机端选择场景 - 3列2行，缩小对齐 */
            .cats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
            .cat-btn { padding: 8px 4px; font-size: 0.7rem; min-height: 36px; }
            
            .result-item { padding: 10px 12px; }
            .result-name { font-size: 0.85rem; }
            .result-link { padding: 5px 10px; font-size: 0.7rem; }
            .footer { font-size: 0.6rem; margin-top: 10px; }
        }
        
        /* 超小屏幕 */
        @media (max-width: 380px) { 
            .quick-grid { gap: 4px; }
            .quick-item { padding: 6px 2px; min-height: 42px; }
            .cats-grid { gap: 4px; }
            .cat-btn { padding: 6px 2px; font-size: 0.65rem; min-height: 32px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="main-card">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <span class="logo-text">AI神器库</span>
                </div>
                <div class="tagline">让每个普通人都能找到最适合自己的AI工具</div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="userInput" placeholder="输入需求：写代码、生成图片、制作视频..." onkeypress="if(event.key==='Enter')matchAI()">
                <button class="search-btn" onclick="matchAI()">搜索</button>
            </div>
            <div id="quickSection">
            <div class="quick-title">🔥 热门工具</div>
            <div class="quick-grid">
                <div class="quick-item" onclick="quickSearch('OpenClaw')"><span class="name">OpenClaw</span><span class="desc">AI助手</span></div>
                <div class="quick-item" onclick="quickSearch('ChatGPT')"><span class="name">ChatGPT</span><span class="desc">最强对话AI</span></div>
                <div class="quick-item" onclick="quickSearch('Claude')"><span class="name">Claude</span><span class="desc">长文本之王</span></div>
                <div class="quick-item" onclick="quickSearch('Midjourney')"><span class="name">Midjourney</span><span class="desc">AI绘图顶流</span></div>
                <div class="quick-item" onclick="quickSearch('Kimi')"><span class="name">Kimi</span><span class="desc">200万字无损</span></div>
                <div class="quick-item" onclick="quickSearch('Cursor')"><span class="name">Cursor</span><span class="desc">编程神器</span></div>
                <div class="quick-item" onclick="quickSearch('通义千问')"><span class="name">通义千问</span><span class="desc">阿里AI</span></div>
                <div class="quick-item" onclick="quickSearch('腾讯元宝')"><span class="name">腾讯元宝</span><span class="desc">腾讯AI</span></div>
                <div class="quick-item" onclick="quickSearch('Accio')"><span class="name">Accio</span><span class="desc">Shopify</span></div>
                <div class="quick-item" onclick="quickSearch('Gamma')"><span class="name">Gamma</span><span class="desc">AI生成PPT</span></div>
            </div>
            </div>
            <div id="catsSection">
            <div class="cats-title">📂 选择场景</div>
            <div class="cats-grid">
                <button class="cat-btn" data-value="AI聊天" onclick="selectCat(this)">AI聊天</button>
                <button class="cat-btn" data-value="AI大模型" onclick="selectCat(this)">AI大模型</button>
                <button class="cat-btn" data-value="AI编程" onclick="selectCat(this)">AI编程</button>
                <button class="cat-btn" data-value="AI绘图" onclick="selectCat(this)">AI绘图</button>
                <button class="cat-btn" data-value="AI视频" onclick="selectCat(this)">AI视频</button>
                <button class="cat-btn" data-value="AI写作" onclick="selectCat(this)">AI写作</button>
                <button class="cat-btn" data-value="AI语音" onclick="selectCat(this)">AI语音</button>
                <button class="cat-btn" data-value="数据分析" onclick="selectCat(this)">数据分析</button>
                <button class="cat-btn" data-value="AI设计" onclick="selectCat(this)">AI设计</button>
                <button class="cat-btn" data-value="AI营销" onclick="selectCat(this)">AI营销</button>
                <button class="cat-btn" data-value="翻译" onclick="selectCat(this)">翻译</button>
                <button class="cat-btn" data-value="AI电商" onclick="selectCat(this)">AI电商</button>
            </div>
            </div>
            <div class="results" id="results">
                <div class="results-header">
                    <span class="results-title">为你推荐</span>
                    <span class="results-count" id="resultCount"></span>
                </div>
                <div class="result-list" id="resultList"></div>
            </div>
            <div class="footer">精选全球顶级AI工具  助力工作生活效率翻倍</div>
        </div>
    </div>
    <script>
var aiTools = {
    "AI聊天": [

        {name:"Claude",price:"免费/付费",tag:"长文本之王",link:"https://claude.ai"},
        {name:"文心一言",price:"免费",tag:"国产首选",link:"https://yiyan.baidu.com"},
        {name:"Kimi",price:"免费",tag:"长文本神器",link:"https://kimi.moonshot.cn"},
        {name:"OpenClaw",price:"免费",tag:"AI助手",link:"https://openclaw.ai"},
        {name:"腾讯元宝",price:"免费",tag:"腾讯AI",link:"https://yuanbao.tencent.com"},

        {name:"豆包",price:"免费",tag:"字节AI",link:"https://www.doubao.com"},
        {name:"讯飞星火",price:"免费",tag:"科大讯飞",link:"https://xinghuo.xfyun.cn"},
        {name:"智谱清言",price:"免费",tag:"国产",link:"https://www.zhipuai.cn"}
    ],
    "AI大模型": [
        {name:"OpenClaw",price:"免费",tag:"AI助手",link:"https://openclaw.ai"},
        {name:"腾讯元宝",price:"免费",tag:"腾讯AI",link:"https://yuanbao.tencent.com"},
        {name:"通义千问",price:"免费",tag:"阿里AI",link:"https://tongyi.aliyun.com"},
        {name:"豆包",price:"免费",tag:"字节AI",link:"https://www.doubao.com"},
        {name:"讯飞星火",price:"免费",tag:"科大讯飞",link:"https://xinghuo.xfyun.cn"},
        {name:"智谱清言",price:"免费",tag:"国产",link:"https://www.zhipuai.cn"},
        {name:"百川智能",price:"免费",tag:"国产",link:"https://www.baichuan-ai.com"},
        {name:"Minimax",price:"免费",tag:"国产",link:"https://www.minimax.io"},
        {name:"阶跃星辰",price:"免费",tag:"国产",link:"https://www.stepfun.com"}
    ],
    "AI编程": [
        {name:"Cursor",price:"免费",tag:"编程神器",link:"https://cursor.sh"},
        {name:"Copilot",price:"$10/月",tag:"老牌",link:"https://github.com/features/copilot"},
        {name:"通义灵码",price:"免费",tag:"阿里免费",link:"https://lingma.aliyun.com"},
        {name:"腾讯云AI代码",price:"免费",tag:"腾讯免费",link:"https://cloud.tencent.com/product/tcci"},
        {name:"文心快码",price:"免费",tag:"百度免费",link:"https://qianfan.cloud.baidu.com/"}
    ],
    "AI绘图": [

        {name:"Stable Diffusion",price:"免费",tag:"开源免费",link:"https://stability.ai"},
        {name:"通义万相",price:"免费",tag:"阿里免费",link:"https://wanxiang.aliyun.com"},
        {name:"文心一格",price:"免费",tag:"百度免费",link:"https://yige.baidu.com"},
        {name:"秒画",price:"免费",tag:"商汤",link:"https://miaohua.sensetime.com"}
    ],
    "AI视频": [
        {name:"Runway",price:"付费",tag:"视频最强",link:"https://runwayml.com"},
        {name:"Pika",price:"免费",tag:"新秀",link:"https://pika.art"},

        {name:"腾讯智影",price:"免费",tag:"腾讯免费",link:"https://zenvideo.qq.com"},
        {name:"剪映",price:"免费",tag:"国产",link:"https://www.capcut.cn"}
    ],
    "AI写作": [
        {name:"Notion AI",price:"付费",tag:"文档神器",link:"https://notion.so"},
        {name:"秘塔写作",price:"免费",tag:"国产",link:"https://xiezuocat.com"}
    ],
    "AI语音": [
        {name:"ElevenLabs",price:"免费",tag:"音质最强",link:"https://elevenlabs.io"},
        {name:"讯飞语音",price:"免费",tag:"国产",link:"https://www.xfyun.cn"}
    ],
    "数据分析": [
        {name:"ChatPDF",price:"免费",tag:"PDF分析",link:"https://chatpdf.com"},
        {name:"Kimi",price:"免费",tag:"免费",link:"https://kimi.moonshot.cn"}
    ],
    "AI设计": [
        {name:"Canva AI",price:"免费",tag:"设计入门",link:"https://canva.com"},
        {name:"稿定AI",price:"免费",tag:"国产",link:"https://gaoding.com"}
    ],
    "AI营销": [
        {name:"秘塔AI",price:"免费",tag:"国产",link:"https://xiezuocat.com"}
    ],
    "翻译": [
        {name:"DeepL",price:"免费",tag:"翻译最强",link:"https://www.deepl.com"},
        {name:"腾讯翻译",price:"免费",tag:"免费",link:"https://fanyi.qq.com"}
    ],
    "AI电商": [
        {name:"Shopify",price:"付费",tag:"全球第一",link:"https://shopify.com"},
        {name:"有赞",price:"付费",tag:"国产",link:"https://www.youzan.com"},
        {name:"微盟",price:"付费",tag:"国产",link:"https://www.weimob.com"}
    ]
};

var keywords = {
    "chatgpt":"AI聊天","gpt":"AI聊天","聊天":"AI聊天","ai":"AI聊天","openclaw":"AI聊天","claude":"AI聊天","kimi":"AI聊天","文心一言":"AI聊天","豆包":"AI聊天","通义千问":"AI聊天","元宝":"AI聊天","腾讯":"AI聊天","讯飞":"AI聊天","智谱":"AI聊天",
    "图片":"AI绘图","画图":"AI绘图","midjourney":"AI绘图","mj":"AI绘图","dalle":"AI绘图","绘图":"AI绘图","stable diffusion":"AI绘图","sd":"AI绘图","通义万相":"AI绘图","文心一格":"AI绘图","秒画":"AI绘图",
    "视频":"AI视频","剪辑":"AI视频","runway":"AI视频","pika":"AI视频","sora":"AI视频","智影":"AI视频","剪映":"AI视频",
    "编程":"AI编程","代码":"AI编程","copilot":"AI编程","cursor":"AI编程","通义灵码":"AI编程","文心快码":"AI编程",
    "写作":"AI写作","文案":"AI写作","润色":"AI写作",
    "语音":"AI语音","配音":"AI语音","tts":"AI语音",
    "分析":"数据分析","pdf":"数据分析",
    "设计":"AI设计","海报":"AI设计","PPT":"AI设计","logo":"AI设计",
    "营销":"AI营销","推广":"AI营销",
    "翻译":"翻译","英语":"翻译",
    "电商":"AI电商","开店":"AI电商","shopify":"AI电商"
};

var selectedCategory = "";
function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.getAttribute('data-value');
    document.getElementById('userInput').value = selectedCategory;
    matchAI();
}
function quickSearch(toolName) {
    document.getElementById('userInput').value = toolName;
    matchAI();
}
function matchAI() {
    var userInput = document.getElementById('userInput').value.trim();
    var results = document.getElementById('results');
    var resultList = document.getElementById('resultList');
    var resultCount = document.getElementById('resultCount');
    var quickSection = document.getElementById('quickSection');
    var catsSection = document.getElementById('catsSection');
    if (!userInput && !selectedCategory) {
        results.classList.remove('show');
        if(quickSection) quickSection.style.display = 'block';
        if(catsSection) catsSection.style.display = 'block';
        return;
    }
    if(quickSection) quickSection.style.display = 'none';
    if(catsSection) catsSection.style.display = 'none';
    var category = selectedCategory;
    if (!category) {
        var input = userInput.toLowerCase();
        for (var key in keywords) {
            if (input.indexOf(key) !== -1) {
                category = keywords[key];
                break;
            }
        }
    }
    if (!category) category = 'AI聊天';
    var tools = aiTools[category] || aiTools['AI聊天'];
    resultCount.textContent = tools.length + ' 个结果';
    var html = '';
    for (var t = 0; t < tools.length; t++) {
        var tool = tools[t];
        html += '<div class="result-item">';
        html += '<div class="result-info">';
        html += '<span class="result-name">' + tool.name + '</span>';
        if (tool.tag) html += '<span class="result-tag">' + tool.tag + '</span>';
        html += '</div>';
        html += '<div style="display:flex;align-items:center;">';
        html += '<span class="result-price">' + tool.price + '</span>';
        if (tool.link) html += '<a href="' + tool.link + '" target="_blank" class="result-link">访问</a>';
        html += '</div></div>';
    }
    resultList.innerHTML = html;
    results.classList.add('show');
}
    </script>
</body>
</html>
