<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI神器库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --cyan: #00f0ff; --green: #00ff88; --dark: #050508; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark); color: white; min-height: 100vh; }
        
        /* 主体区域居中 */
        .wrap { width: 100%; max-width: 900px; margin: 0 auto; padding: 60px 20px 40px; }
        
        .logo-section { text-align: center; margin-bottom: 32px; }
        .logo { display: inline-flex; align-items: center; gap: 12px; font-size: 2.6rem; font-weight: 700; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, var(--cyan), var(--green)); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.6rem; box-shadow: 0 0 20px var(--cyan); }
        .logo-text { background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--green) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 0.95rem; color: #00f0ff; font-weight: 600; margin-top: 8px; text-shadow: 0 0 18px rgba(0,240,255,0.5); }
        
        /* 搜索框 - 百度风格 */
        .search-wrap { margin-bottom: 28px; }
        .search-box { display: flex; width: 100%; height: 48px; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.4); border: 1px solid #3d4654; }
        .search-input { flex: 1; background: #fff; border: none; padding: 0 20px; font-size: 1.1rem; color: #333; line-height: 48px; }
        .search-input::placeholder { color: #999; }
        .search-input:focus { outline: none; }
        .search-btn { width: 100px; background: linear-gradient(135deg, #1e90ff, #00d4ff); border: none; font-size: 1.1rem; font-weight: 600; color: #fff; cursor: pointer; }
        .search-btn:hover { background: linear-gradient(135deg, #1c86ee, #00c4ee); }
        
        /* 热门工具 */
        .section { margin-bottom: 20px; }
        .section-title { font-size: 0.95rem; color: #888; margin-bottom: 12px; }
        
        .quick-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .quick-item { display: inline-flex; align-items: center; padding: 8px 16px; background: #1a1d24; border: 1px solid #2d323d; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        .quick-item:hover { background: #2a2f3a; border-color: #00d4ff; }
        .quick-item .name { font-size: 0.9rem; color: #fff; font-weight: 500; }
        .quick-item .desc { font-size: 0.7rem; color: #888; margin-left: 6px; }
        
        /* 选择场景 */
        .cats-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .cat-btn { display: inline-flex; align-items: center; padding: 8px 16px; background: #1a1d24; border: 1px solid #2d323d; border-radius: 20px; color: #aaa; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .cat-btn:hover { background: #2a2f3a; border-color: #00d4ff; color: #fff; }
        .cat-btn.active { background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,255,136,0.1)); border-color: #00d4ff; color: #00d4ff; }
        
        /* 结果区域 */
        .results { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #2d323d; }
        .results.show { display: block; }
        .result-list { display: flex; flex-direction: column; gap: 12px; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: #1a1d24; border-radius: 10px; border: 1px solid #2d323d; }
        .result-info { display: flex; align-items: center; gap: 12px; }
        .result-name { font-size: 1rem; font-weight: 600; color: #00d4ff; }
        .result-tag { font-size: 0.55rem; padding: 2px 6px; background: linear-gradient(135deg, #1e90ff, #00d4ff); color: #fff; border-radius: 8px; font-weight: 600; }
        .result-price { font-size: 0.8rem; color: #00ff88; margin-right: 12px; }
        .result-link { padding: 6px 18px; background: linear-gradient(135deg, #1e90ff, #00d4ff); color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        
        .footer { text-align: center; color: #444; font-size: 0.7rem; margin-top: 24px; }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            .wrap { padding: 40px 16px 30px; }
            .logo { font-size: 1.8rem; gap: 8px; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.1rem; }
            .tagline { font-size: 0.8rem; }
            .search-box { height: 44px; border-radius: 22px; }
            .search-input { font-size: 1rem; padding: 0 16px; }
            .search-btn { width: 80px; font-size: 1rem; }
            .quick-item { padding: 6px 12px; }
            .quick-item .name { font-size: 0.8rem; }
            .quick-item .desc { font-size: 0.6rem; }
            .cat-btn { padding: 6px 12px; font-size: 0.75rem; }
            .result-item { padding: 12px 14px; }
            .result-name { font-size: 0.9rem; }
            .result-link { padding: 5px 14px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <span class="logo-text">AI神器库</span>
            </div>
            <div class="tagline">让每个普通人都能找到最适合自己的AI工具</div>
        </div>
        
        <div class="search-wrap">
            <div class="search-box">
                <input type="text" class="search-input" id="userInput" placeholder="输入需求：写代码、生成图片、制作视频..." onkeypress="if(event.key==='Enter')matchAI()">
                <button class="search-btn" onclick="matchAI()">搜索</button>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">热门工具</div>
            <div class="quick-grid" id="quickSection">

                <div class="quick-item" onclick="quickSearch('ChatGPT')"><span class="name">ChatGPT</span><span class="desc">最强对话AI</span></div>
                <div class="quick-item" onclick="quickSearch('Claude')"><span class="name">Claude</span><span class="desc">长文本之王</span></div>
                <div class="quick-item" onclick="quickSearch('Midjourney')"><span class="name">Midjourney</span><span class="desc">AI绘图顶流</span></div>
                <div class="quick-item" onclick="quickSearch('Kimi')"><span class="name">Kimi</span><span class="desc">200万字无损</span></div>
                <div class="quick-item" onclick="quickSearch('Cursor')"><span class="name">Cursor</span><span class="desc">编程神器</span></div>
                <div class="quick-item" onclick="quickSearch('通义千问')"><span class="name">通义千问</span><span class="desc">阿里AI</span></div>
                <div class="quick-item" onclick="quickSearch('腾讯元宝')"><span class="name">腾讯元宝</span><span class="desc">腾讯AI</span></div>
                <div class="quick-item" onclick="quickSearch('Accio')"><span class="name">Accio</span><span class="desc">Shopify</span></div>
                <div class="quick-item" onclick="quickSearch('Gamma')"><span class="name">Gamma</span><span class="desc">AI生成PPT</span></div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">选择场景</div>
            <div class="cats-grid" id="catsSection">
                <button class="cat-btn" data-value="AI聊天" onclick="selectCat(this)">AI聊天</button>
                <button class="cat-btn" data-value="AI大模型" onclick="selectCat(this)">AI大模型</button>
                <button class="cat-btn" data-value="AI编程" onclick="selectCat(this)">AI编程</button>
                <button class="cat-btn" data-value="AI绘图" onclick="selectCat(this)">AI绘图</button>
                <button class="cat-btn" data-value="AI视频" onclick="selectCat(this)">AI视频</button>
                <button class="cat-btn" data-value="AI写作" onclick="selectCat(this)">AI写作</button>
                <button class="cat-btn" data-value="AI语音" onclick="selectCat(this)">AI语音</button>
                <button class="cat-btn" data-value="数据分析" onclick="selectCat(this)">数据分析</button>
                <button class="cat-btn" data-value="AI设计" onclick="selectCat(this)">AI设计</button>
                <button class="cat-btn" data-value="AI营销" onclick="selectCat(this)">AI营销</button>
                <button class="cat-btn" data-value="翻译" onclick="selectCat(this)">翻译</button>
                <button class="cat-btn" data-value="AI电商" onclick="selectCat(this)">AI电商</button>
            </div>
        </div>
        
        <div class="results" id="results">
            <div class="result-list" id="resultList"></div>
        </div>
        
        <div class="footer">精选全球顶级AI工具  助力工作生活效率翻倍</div>
    </div>
    
    <script>
var aiTools = {

        {name:"ChatPDF",price:"免费",tag:"PDF分析",link:"https://chatpdf.com"},

    "AI设计": [
        {name:"Canva AI",price:"免费",tag:"设计入门",link:"https://canva.com"},

    ],

        {name:"秘塔AI",price:"免费",tag:"国产",link:"https://xiezuocat.com"}
    ],

        {name:"DeepL",price:"免费",tag:"翻译最强",link:"https://www.deepl.com"},
        {name:"腾讯翻译",price:"免费",tag:"免费",link:"https://fanyi.qq.com"}

    "AI电商": [

        {name:"有赞",price:"付费",tag:"国产",link:"https://www.youzan.com"},
        {name:"微盟",price:"付费",tag:"国产",link:"https://www.weimob.com"}
    ]
};

var keywords = {
    "chatgpt":"AI聊天","gpt":"AI聊天","聊天":"AI聊天","ai":"AI聊天","openclaw":"AI聊天","claude":"AI聊天","kimi":"AI聊天","文心一言":"AI聊天","豆包":"AI聊天","通义千问":"AI聊天","元宝":"AI聊天","腾讯":"AI聊天","讯飞":"AI聊天","智谱":"AI聊天",
    "图片":"AI绘图","画图":"AI绘图","midjourney":"AI绘图","mj":"AI绘图","dalle":"AI绘图","绘图":"AI绘图","stable diffusion":"AI绘图","sd":"AI绘图","通义万相":"AI绘图","文心一格":"AI绘图","秒画":"AI绘图",
    "视频":"AI视频","剪辑":"AI视频","runway":"AI视频","pika":"AI视频","sora":"AI视频","智影":"AI视频","剪映":"AI视频",
    "编程":"AI编程","代码":"AI编程","copilot":"AI编程","cursor":"AI编程","通义灵码":"AI编程","文心快码":"AI编程",
    "写作":"AI写作","文案":"AI写作","润色":"AI写作",
    "语音":"AI语音","配音":"AI语音","tts":"AI语音",
    "分析":"数据分析","pdf":"数据分析",
    "设计":"AI设计","海报":"AI设计","PPT":"AI设计","logo":"AI设计",
    "营销":"AI营销","推广":"AI营销",
    "翻译":"翻译","英语":"翻译",
    "电商":"AI电商","开店":"AI电商","shopify":"AI电商"
};

var selectedCategory = "";
function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.getAttribute('data-value');
    document.getElementById('userInput').value = selectedCategory;
    matchAI();
}
function quickSearch(toolName) {
    document.getElementById('userInput').value = toolName;
    matchAI();
}
function matchAI() {
    var userInput = document.getElementById('userInput').value.trim();
    var results = document.getElementById('results');
    var resultList = document.getElementById('resultList');
    var quickSection = document.getElementById('quickSection');
    var catsSection = document.getElementById('catsSection');
    if (!userInput && !selectedCategory) {
        results.classList.remove('show');
        return;
    }
    var category = selectedCategory;
    if (!category) {
        var input = userInput.toLowerCase();
        for (var key in keywords) {
            if (input.indexOf(key) !== -1) {
                category = keywords[key];
                break;
            }
        }
    }
    if (!category) category = 'AI聊天';
    var tools = aiTools[category] || aiTools['AI聊天'];
    var html = '';
    for (var t = 0; t < tools.length; t++) {
        var tool = tools[t];
        html += '<div class="result-item">';
        html += '<div class="result-info">';
        html += '<span class="result-name">' + tool.name + '</span>';
        if (tool.tag) html += '<span class="result-tag">' + tool.tag + '</span>';
        html += '</div>';
        html += '<div style="display:flex;align-items:center;">';
        html += '<span class="result-price">' + tool.price + '</span>';
        if (tool.link) html += '<a href="' + tool.link + '" target="_blank" class="result-link">访问</a>';
        html += '</div></div>';
    }
    resultList.innerHTML = html;
    results.classList.add('show');
}
    </script>
</body>
</html>
