<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI神器库</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cyan: #00f0ff;
            --purple: #a855f7;
            --green: #00ff88;
            --dark: #050508;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        
        .glow-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,240,255,0.12) 0%, transparent 60%);
            animation: glowPulse 6s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
        
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,240,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .tech-left {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 1;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            width: 1px;
            height: 40%;
            background: linear-gradient(to bottom, transparent, var(--cyan), transparent);
            animation: scanMove 3s linear infinite;
        }
        
        .scan-line:nth-child(1) { left: 10%; top: 0; animation-delay: 0s; }
        .scan-line:nth-child(2) { left: 25%; top: 20%; animation-delay: 0.5s; }
        .scan-line:nth-child(3) { left: 40%; top: 40%; animation-delay: 1s; }
        .scan-line:nth-child(4) { left: 55%; top: 60%; animation-delay: 1.5s; }
        .scan-line:nth-child(5) { left: 70%; top: 80%; animation-delay: 2s; }
        
        @keyframes scanMove {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(300%); opacity: 0; }
        }
        
        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 50%;
            animation: orbitRotate 15s linear infinite;
        }
        
        .orbit-ring::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan);
        }
        
        .orbit-ring:nth-child(6) { width: 80px; height: 80px; top: 15%; left: 15%; }
        .orbit-ring:nth-child(7) { width: 120px; height: 120px; top: 35%; left: 30%; animation-duration: 20s; }
        .orbit-ring:nth-child(8) { width: 60px; height: 60px; top: 55%; left: 10%; animation-duration: 12s; }
        .orbit-ring:nth-child(9) { width: 100px; height: 100px; bottom: 15%; left: 20%; animation-duration: 18s; }
        
        @keyframes orbitRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .data-stream {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: rgba(0,240,255,0.3);
            writing-mode: vertical-rl;
            animation: dataFloat 4s ease-in-out infinite;
        }
        
        .data-stream:nth-child(10) { top: 20%; left: 60%; animation-delay: 0s; }
        .data-stream:nth-child(11) { top: 40%; left: 75%; animation-delay: 1s; }
        .data-stream:nth-child(12) { top: 60%; left: 85%; animation-delay: 2s; }
        
        @keyframes dataFloat {
            0%, 100% { transform: translateY(0); opacity: 0.2; }
            50% { transform: translateY(-10px); opacity: 0.5; }
        }
        
        .tech-right {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 25%;
            z-index: 1;
            pointer-events: none;
        }
        
        .hex-grid {
            position: absolute;
            right: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(168,85,247,0.08) 0%, transparent 30%),
                radial-gradient(circle at 60% 80%, rgba(0,255,136,0.05) 0%, transparent 30%);
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            animation: particleFloat 8s ease-in-out infinite;
        }
        
        .particle:nth-child(1) { top: 10%; right: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 30%; right: 40%; animation-delay: 1s; }
        .particle:nth-child(3) { top: 50%; right: 15%; animation-delay: 2s; }
        .particle:nth-child(4) { top: 70%; right: 35%; animation-delay: 3s; }
        .particle:nth-child(5) { top: 90%; right: 25%; animation-delay: 4s; }
        
        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 1; }
        }
        
        .pulse-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            animation: pulseBlink 2s ease-in-out infinite;
        }
        
        .pulse-dot:nth-child(6) { top: 25%; right: 30%; }
        .pulse-dot:nth-child(7) { top: 45%; right: 50%; animation-delay: 0.5s; }
        .pulse-dot:nth-child(8) { top: 65%; right: 20%; animation-delay: 1s; }
        
        @keyframes pulseBlink {
            0%, 100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 0 rgba(0,240,255,0); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 20px var(--cyan); }
        }
        
        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .main-card {
            width: 100%;
            max-width: 900px;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 40px 30px;
            box-shadow: none;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 6px;
        }
        
        .logo-icon {
            position: relative;
            width: 56px;
            height: 56px;
        }
        
        .logo-icon .core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border-radius: 50%;
            box-shadow: 0 0 25px var(--cyan);
            animation: corePulse 2s ease-in-out infinite;
        }
        
        .logo-icon .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--cyan);
            border-radius: 50%;
            animation: ringRotate 4s linear infinite;
        }
        
        .logo-icon .ring:nth-child(2) {
            width: 40px;
            height: 40px;
            margin: -20px 0 0 -20px;
            opacity: 0.8;
        }
        
        .logo-icon .ring:nth-child(3) {
            width: 56px;
            height: 56px;
            margin: -28px 0 0 -28px;
            opacity: 0.4;
            animation-direction: reverse;
            animation-duration: 6s;
        }
        
        @keyframes corePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }
        
        @keyframes ringRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .logo-text {
            background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 22px 28px;
            font-size: 1.15rem;
            color: white;
            transition: all 0.3s;
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--cyan);
            background: rgba(0,240,255,0.08);
        }
        
        .search-btn {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border: none;
            border-radius: 16px;
            padding: 22px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0,240,255,0.4);
        }
        
        .quick-section {
            margin-bottom: 20px;
        }
        
        .quick-section.hidden {
            display: none;
        }
        
        .cats-section {
            margin-bottom: 20px;
        }
        
        .cats-section.hidden {
            display: none;
        }
        
        .quick-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
            margin-bottom: 16px;
            text-align: center;
        }
        
        .quick-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 28px;
        }
        
        .quick-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }
        
        .quick-item:hover {
            background: rgba(0,240,255,0.15);
            border-color: var(--cyan);
            transform: translateY(-3px);
        }
        
        .quick-item .q-name {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        
        .quick-item .q-desc {
            font-size: 0.7rem;
            color: rgba(0,240,255,0.8);
            margin-top: 4px;
        }
        
        .cats-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
            margin-bottom: 16px;
            text-align: center;
        }
        
        .cats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 28px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .cat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .cat-btn:hover {
            background: rgba(0,240,255,0.12);
            border-color: rgba(0,240,255,0.4);
            color: white;
        }
        
        .cat-btn.active {
            background: linear-gradient(135deg, rgba(0,240,255,0.25), rgba(0,255,136,0.15));
            border-color: var(--cyan);
            color: white;
        }
        
        .results {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .results.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; }
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        
        .results-title {
            font-size: 1rem;
            color: var(--cyan);
            font-weight: 600;
        }
        
        .results-count {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
        
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .result-item:hover {
            background: rgba(0,240,255,0.06);
            border-color: rgba(0,240,255,0.15);
        }
        
        .result-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .result-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--cyan);
        }
        
        .result-tag {
            font-size: 0.6rem;
            padding: 3px 8px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            color: #000;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .result-price {
            font-size: 0.8rem;
            color: var(--green);
            margin-right: 14px;
        }
        
        .result-link {
            padding: 8px 18px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .result-link:hover {
            transform: scale(1.05);
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .tech-left, .tech-right { display: none; }
            .container { padding: 20px 15px; }
            .main-card { padding: 20px 15px; max-width: 100%; }
            .logo { font-size: 2rem; gap: 8px; }
            .logo-icon { width: 36px; height: 36px; }
            .logo-icon .core { width: 18px; height: 18px; }
            .logo-icon .ring:nth-child(2) { width: 26px; height: 26px; margin: -13px 0 0 -13px; }
            .logo-icon .ring:nth-child(3) { width: 36px; height: 36px; margin: -18px 0 0 -18px; }
            .search-box { flex-direction: column; gap: 10px; max-width: 100%; }
            .search-btn { width: 100%; }
            .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .quick-item { padding: 12px 8px; min-width: auto; }
            .quick-item .q-name { font-size: 0.8rem; }
            .quick-item .q-desc { font-size: 0.6rem; }
            .cats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 100%; }
            .cat-btn { padding: 10px 6px; font-size: 0.75rem; }
            .result-item { flex-wrap: wrap; gap: 8px; }
            .result-link { width: 100%; text-align: center; }
        }
        
        @media (max-width: 480px) {
            .logo { font-size: 1.6rem; letter-spacing: 2px; }
            .tagline { font-size: 0.75rem; }
            .search-input { padding: 14px 16px; font-size: 0.95rem; }
            .search-btn { padding: 14px; font-size: 0.95rem; }
            .quick-grid { grid-template-columns: repeat(2, 1fr); }
            .cats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="glow-center"></div>
        <div class="grid-bg"></div>
    </div>
    
    <div class="tech-left">
        <div class="scan-line"></div>
        <div class="scan-line"></div>
        <div class="scan-line"></div>
        <div class="scan-line"></div>
        <div class="scan-line"></div>
        <div class="orbit-ring"></div>
        <div class="orbit-ring"></div>
        <div class="orbit-ring"></div>
        <div class="orbit-ring"></div>
        <div class="data-stream">0100101 NEURAL</div>

    <div class="tech-right">
        <div class="hex-grid"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="pulse-dot"></div>
        <div class="pulse-dot"></div>
        <div class="pulse-dot"></div>
    </div>
    
    <div class="container">
        <div class="main-card">

                <div class="logo">
                    <div class="logo-icon">
                        <div class="ring"></div>
                        <div class="ring"></div>

                    </div>

            <div class="search-box">

                </div>
                <div class="quick-item" onclick="quickSearch('Claude')">

                <div class="quick-item" onclick="quickSearch('Kimi')">

                </div>
                <div class="quick-item" onclick="quickSearch('Cursor')">

                <button class="cat-btn" data-value="写作创作" onclick="selectCat(this)">AI写作</button>

                <button class="cat-btn" data-value="数据分析" onclick="selectCat(this)">数据分析</button>
                <button class="cat-btn" data-value="AI设计" onclick="selectCat(this)">AI设计</button>
                <button class="cat-btn" data-value="AI营销" onclick="selectCat(this)">AI营销</button>
                <button class="cat-btn" data-value="翻译语言" onclick="selectCat(this)">翻译</button>
                <button class="cat-btn" data-value="短视频" onclick="selectCat(this)">短视频</button>
                <button class="cat-btn" data-value="电商运营" onclick="selectCat(this)">电商</button>
            </div>
            </div>
            
            <div class="results" id="results">
                <div class="results-header">
                    <span class="results-title">为你推荐</span>
                    <span class="results-count" id="resultCount"></span>
                </div>
                <div class="result-list" id="resultList"></div>
            </div>
            
            <div class="footer">
                精选全球顶级AI工具  助力工作生活效率翻倍
            </div>
        </div>
    </div>
    
    <script>
var aiTools = {
    "AI聊天": [
        {name:"ChatGPT",price:"Free/Paid",tag:"#1 World",link:"https://chat.openai.com"},
        {name:"Claude",price:"Free/Paid",tag:"Long Text",link:"https://claude.ai"},
        {name:"Wenxin Yiyan",price:"Free",tag:"Baidu CN",link:"https://yiyan.baidu.com"},
        {name:"Kimi",price:"Free",tag:"2M Context",link:"https://kimi.moonshot.cn"}
    ],
    "图像生成": [
        {name:"Midjourney",price:"$10/mo",tag:"#1 Art",link:"https://midjourney.com"},
        {name:"Stable Diffusion",price:"Free",tag:"Open Source",link:"https://stability.ai"},
        {name:"Tongyi Wanxiang",price:"Free",tag:"Alibaba",link:"https://wanxiang.aliyun.com"}
    ],
    "视频生成": [
        {name:"Runway",price:"Paid",tag:"#1 Video",link:"https://runwayml.com"},
        {name:"Pika",price:"Free",tag:"New",link:"https://pika.art"},
        {name:"HeyGen",price:"Free",tag:"Avatar",link:"https://heygen.com"}

var selectedCategory = "";

function selectCat(btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = btn.getAttribute('data-value');
    document.getElementById('userInput').value = selectedCategory;
    matchAI();
}

function quickSearch(toolName) {
    document.getElementById('userInput').value = toolName;
    matchAI();
}

function matchAI() {
    var userInput = document.getElementById('userInput').value.trim();
    var results = document.getElementById('results');
    var resultList = document.getElementById('resultList');
    var resultCount = document.getElementById('resultCount');
    var quickSection = document.getElementById('quickSection');
    var catsSection = document.getElementById('catsSection');
    
    if (!userInput && !selectedCategory) {
        results.classList.remove('show');
        if(quickSection) quickSection.style.display = 'block';
        if(catsSection) catsSection.style.display = 'block';
        return;
    }
    
    if(quickSection) quickSection.style.display = 'none';
    if(catsSection) catsSection.style.display = 'none';
    
    var category = selectedCategory;
    if (!category) {
        var input = userInput.toLowerCase();
        for (var key in keywords) {
            if (input.indexOf(key) !== -1) {
                category = keywords[key];
                break;
            }
        }
    }
    if (!category) category = 'AI聊天';
    
    var tools = aiTools[category] || aiTools['AI聊天'];
    resultCount.textContent = tools.length + '个';
    
    var html = '';
    for (var t = 0; t < tools.length; t++) {
        var tool = tools[t];
        html += '<div class="result-item">';
        html += '<div class="result-info">';
        html += '<span class="result-name">' + tool.name + '</span>';
        if (tool.tag) html += '<span class="result-tag">' + tool.tag + '</span>';
        html += '</div>';
        html += '<div style="display:flex;align-items:center;">';
        html += '<span class="result-price">' + tool.price + '</span>';
        if (tool.link) html += '<a href="' + tool.link + '" target="_blank" class="result-link">Visit</a>';
        html += '</div></div>';
    }
    
    resultList.innerHTML = html;
    results.classList.add('show');
}
